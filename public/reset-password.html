<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<title>Set New Password — SkyReserve</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="splash-screen" class="splash-screen" aria-hidden="true">
    <div class="splash-badge">
        <img src="/assets/logo-mark.svg" alt="" class="splash-mark">
    </div>
    <div class="splash-track">
        <span class="splash-plane">&#9992;&#65039;</span>
    </div>
    <div class="splash-word">SkyReserve</div>
</div>
<div id="app-navbar"></div>

<main class="auth-shell">
    <div class="card auth-card card-pad">
        <h1>Set a new password</h1>
        <p class="sub">Choose a strong new password for your account.</p>

        <div id="form-alert"></div>

        <form id="reset-form" novalidate>
            <div class="field">
                <label for="token">Reset token</label>
                <input class="input" type="text" id="token" required maxlength="200">
            </div>
            <div class="field">
                <label for="newPassword">New password</label>
                <input class="input" type="password" id="newPassword" autocomplete="new-password" required maxlength="128">
                <div class="form-hint">At least 8 characters, with uppercase, lowercase, a digit, and a symbol.</div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="reset-submit">
                <span class="btn-label">Update Password</span>
            </button>
        </form>
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/reset-password.js"></script>
<script src="/js/password-toggle.js"></script>
<script src="/js/footer.js"></script>
<script src="/js/splash.js"></script>
</body>
</html>
