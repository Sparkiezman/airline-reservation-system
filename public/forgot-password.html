<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<title>Forgot Password — SkyReserve</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="splash-screen" class="splash-screen" aria-hidden="true">
    <div class="splash-badge">
        <img src="/assets/logo-mark.svg" alt="" class="splash-mark">
    </div>
    <div class="splash-track">
        <span class="splash-plane">&#9992;&#65039;</span>
    </div>
    <div class="splash-word">SkyReserve</div>
</div>
<div id="app-navbar"></div>

<main class="auth-shell">
    <div class="card auth-card card-pad">
        <h1>Reset your password</h1>
        <p class="sub">Enter your account email and we'll generate a reset link.</p>

        <div id="form-alert"></div>

        <form id="forgot-form" novalidate>
            <div class="field">
                <label for="email">Email address</label>
                <input class="input" type="email" id="email" required maxlength="255">
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="forgot-submit">
                <span class="btn-label">Send Reset Link</span>
            </button>
        </form>

        <p class="auth-switch">Remembered it? <a href="/login.html">Back to log in</a></p>
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/forgot-password.js"></script>
<script src="/js/footer.js"></script>
<script src="/js/splash.js"></script>
</body>
</html>
